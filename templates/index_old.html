<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>简易图书管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h2 class="mb-3">📚 图书列表</h2>

  <!-- 新增 -->
  <form action="/add" method="post" class="row g-2 mb-4">
    <div class="col"><input class="form-control" name="title" placeholder="Title" required></div>
    <div class="col"><input class="form-control" name="author" placeholder="Author" required></div>
    <div class="col"><input class="form-control" name="publish_date" placeholder="Date" required></div>
    <div class="col"><input class="form-control" name="isbn" placeholder="ISBN" required></div>
    <div class="col-auto"><button class="btn btn-primary">➕ Add</button></div>
  </form>

  <!-- 列表 -->
  <table class="table table-hover">
    <thead class="table-light"><tr><th>Title</th><th>Author</th><th>Date</th><th>ISBN</th><th></th></tr></thead>
    <tbody>
    {% for b in books %}
      <tr>
        <td>{{ b[1] }}</td><td>{{ b[2] }}</td><td>{{ b[3] }}</td><td>{{ b[4] }}</td>
        <td>
          <a class="btn btn-sm btn-danger" href="/delete/{{ b[1] }}" onclick="return confirm('Sure?')">🗑️ Delete</a>
        </td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</body>
</html>
