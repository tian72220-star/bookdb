<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Library Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">
  <h1 class="mb-4">📚 Library Management System</h1>

  <!-- Add -->
  <div class="card mb-4">
    <div class="card-header">Add New Book</div>
    <div class="card-body">
      <form action="/add" method="post" class="row g-2">
        <div class="col"><input class="form-control" name="title" placeholder="Title" required></div>
        <div class="col"><input class="form-control" name="author" placeholder="Author" required></div>
        <div class="col"><input class="form-control" name="publish_date" placeholder="Publish Date" required></div>
        <div class="col"><input class="form-control" name="isbn" placeholder="ISBN" required></div>
        <div class="col-auto"><button class="btn btn-primary">➕ Add Book</button></div>
      </form>
    </div>
  </div>

  <!-- Search -->
  <div class="card mb-4">
    <div class="card-header">Search Book (Exact Title)</div>
    <div class="card-body">
      <form action="/search" method="get" class="row g-2">
        <div class="col"><input class="form-control" name="keyword" placeholder="Enter exact title" required></div>
        <div class="col-auto"><button class="btn btn-success">🔍 Search</button></div>
        <div class="col-auto"><a class="btn btn-outline-secondary" href="/">Show All</a></div>
      </form>
    </div>
  </div>

  <!-- List -->
  <div class="card">
    <div class="card-header">Book List</div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Title</th><th>Author</th><th>Date</th><th>ISBN</th><th>Actions</th></tr></thead>
        <tbody>
        {% for b in books %}
          <tr>
            <td>{{ b[1] }}</td><td>{{ b[2] }}</td><td>{{ b[3] }}</td><td>{{ b[4] }}</td>
            <td>
              <a class="btn btn-sm btn-danger" href="/delete/{{ b[1] }}" onclick="return confirm('Delete this book?')">🗑️ Delete</a>
            </td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
